name: shadcn_ui
description: shadcn/ui ported in Flutter. Awesome UI components for Flutter, fully customizable.
version: 0.53.6
homepage: https://mariuti.com/flutter-shadcn-ui
repository: https://github.com/nank1ro/flutter-shadcn-ui
documentation: https://mariuti.com/flutter-shadcn-ui
topics:
  - user-interface
  - design-system
  - shadcn-ui
  - material-alternative

environment:
  sdk: ">=3.8.0 <4.0.0"
  flutter: ">=3.35.0"

dependencies:
  boxy: ">=2.1.2 <3.0.0"
  collection: ">=1.0.0 <2.0.0"
  flutter:
    sdk: flutter
  flutter_animate: ">=4.4.0 <5.0.0"
  flutter_localizations:
    sdk: flutter
  flutter_svg: ">=2.0.0 <3.0.0"
  intl: ">=0.19.0 <1.0.0"
  lucide_icons_flutter: ">=3.0.0 <4.0.0"
  slang: ^4.13.0
  slang_flutter: ^4.13.0
  # used by Table
  theme_extensions_builder_annotation: ^7.1.0
  two_dimensional_scrollables: ">=0.2.1 <1.0.0"
  universal_image: ">=1.0.3 <2.0.0"
  vector_graphics: ">=1.0.0 <2.0.0"
  web: ^1.1.1

dev_dependencies:
  build_runner: ^2.12.2
  flutter_test:
    sdk: flutter
  mocktail: ^1.0.4
  slang_build_runner: ^4.13.0
  theme_extensions_builder: ^7.1.0
  very_good_analysis: ^10.0.0

flutter:
  fonts:
    - family: Geist
      fonts:
        - asset: fonts/Geist[wght].ttf
    - family: GeistMono
      fonts:
        - asset: fonts/GeistMono[wght].ttf
